apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.frontend.service.name }}
  namespace: {{ .Values.frontend.deployment.namespace }}
spec:
  type: {{ .Values.frontend.service.type }}
  selector:
    app: {{ include "traxxia.name" . }}-frontend-app
  ports:
    - protocol: TCP
      port: {{ .Values.frontend.service.port }}
      targetPort: {{ .Values.frontend.application.containerPort }}
