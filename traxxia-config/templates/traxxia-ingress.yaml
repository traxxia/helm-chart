apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "traxxia.fullname" . }}-ingress
  namespace: {{ .Values.config.deployment.namespace }}
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
  - hosts:
      - {{ .Values.config.tls.hosts.frontend }}
      - {{ .Values.config.tls.hosts.backend }}
    secretName: {{ .Values.config.tls.secretName }}
  rules:
  - host: {{ .Values.config.tls.hosts.frontend }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.config.service.frontend }}
            port:
              number: {{ .Values.config.service.port.frontend }}
  - host: {{ .Values.config.tls.hosts.backend }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.config.service.backend }}
            port:
              number: {{ .Values.config.service.port.backend }}
