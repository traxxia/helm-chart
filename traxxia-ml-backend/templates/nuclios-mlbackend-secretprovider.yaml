apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "traxxia.fullname" . }}-mlbackend-spc
  namespace: {{ .Values.mlbackend.deployment.namespace }}
spec:
  provider: azure
  secretObjects:
    - secretName: {{ .Values.mlbackend.aks.secretName }}
      type: Opaque
      data:
        - objectName: NEWSAPI-API-KEY
          key: NEWSAPI_API_KEY
        - objectName: OPENAI-API-KEY
          key: OPENAI_API_KEY
  parameters:
    useVMManagedIdentity: "true"
    userAssignedIdentityID: "{{ .Values.mlbackend.azure.clientId }}"
    tenantId: "{{ .Values.mlbackend.azure.tenantId }}"
    resourceGroup: "{{ .Values.mlbackend.azure.resourceGroup }}"
    keyvaultName: "{{ .Values.mlbackend.azure.keyVaultName }}"
    objects: |
      array:
        - |
          objectName: NEWSAPI-API-KEY
          objectType: secret
        - |
          objectName: OPENAI-API-KEY
          objectType: secret
    syncSecret.enabled: "true"