backend:
  image:
    repository: traxdevacr.azurecr.io/trax_dev_backend
    tag: latest
    pullPolicy: Always

  service:
    name: traxxia-backend-service
    type: ClusterIP
    port: 5000

  application:
    containerPort: 5000

  deployment:
    nodeSelectorLabel: userpool
    namespace: ns-trax-dev
    replicas: 2
    resources:
      limits:
        cpu: "2"
        memory: 4G
      requests:
        cpu: "2"
        memory: 4G

  azure:
    keyVaultName: trax-dev-akv
    resourceGroup: trax-dev-core-rg
    tenantId: 3e737f0d-eee3-42c1-8c0f-cfd3e6f7053a
    clientId: 59682913-7dc9-490b-bd03-d181863ee5b0

  aks:
    secretName: backend-secret
    serviceAccount: traxxia-aks-sa

  keyVault:
    secrets:
      - name: MONGO-URI
        alias: MONGO_URI
      - name: SECRET-KEY
        alias: SECRET_KEY
      - name: ENCRYPTION-KEY
        alias: ENCRYPTION_KEY